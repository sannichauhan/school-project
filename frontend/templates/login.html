{% extends 'base2.html' %} 
{% load static %}
{% block content %}
   
    <!-- Login Page Start Here -->
    <div class="login-page-wrap">
        <div class="login-page-content">
            <div class="login-box">
                <div class="item-logo">
                    <img src="{% static 'img/ncps-logo.jpeg' %}" alt="logo">
                </div>
                <form action="" method="POST" class="login-form">
                    {% csrf_token %}
                    <div class="form-group">
                        <label for="{{ form.username.id_for_label}}">Username</label>
                        <input type="text" placeholder="Enter usrename" class="form-control" name="{{ form.username.name }}" value={{ form.username.value }}>
                        <i class="far fa-envelope"></i>
                        <span class="text-danger">{{ form.username.errors }}</span>
                    </div>
                    <div class="form-group">
                        <label for="{{ form.password.id_for_label }}">Password</label>
                        <input type="password" placeholder="Enter password" name="{{ form.password.name }}" class="form-control">
                        <i class="fas fa-lock"></i>
                        <span class="text-danger">{{ form.password.errors }}</span>
                    </div>
                    <div class="form-group d-flex align-items-center justify-content-between">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="remember-me">
                            <label for="remember-me" class="form-check-label">Remember Me</label>
                        </div>
                        <a href="#" class="forgot-btn">Forgot Password?</a>
                    </div>
                    <div class="form-group">
                        <button type="submit" class="login-btn">Login</button>
                    </div>
                </form>                
            </div>
        </div>
    </div>

{% endblock content %}
