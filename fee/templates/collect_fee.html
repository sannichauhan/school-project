<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Process Fee Payment</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    
    <style>
        /* Centering container structure using vanilla CSS over Bootstrap body minimum height */
        body {
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .payment-card {
            max-width: 450px;
            width: 100%;
            border-radius: 1rem;
            border: 1px solid #e2e8f0;
            overflow: hidden;
            background: #ffffff;
        }
        .label-uppercase-xs {
            font-size: 0.75rem;
            font-weight: 700;
            color: #4a5568;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body class="p-3">

    <div class="payment-card shadow-lg">
        <div class="bg-primary p-4 text-white">
            <h2 class="h5 font-weight-bold mb-1">Collect Student Fee</h2>
            <p class="text-light small mb-0">Processing payment for {{ ledger.student.first_name }} {{ ledger.student.last_name }}</p>
        </div>

        <form method="POST" class="p-4">
            {% csrf_token %}
            
            <div class="alert alert-light border card-body p-3 mb-4 rounded-lg text-secondary small">
                <p class="mb-2">Component: <span class="font-weight-bold text-dark">{{ ledger.description }}</span></p>
                <p class="mb-0">Net Due Amount: <span class="font-weight-bold text-danger h5 d-inline-block mb-0">₹{{ ledger.remaining_amount }}</span></p>
            </div>

            <div class="form-group mb-3">
                <label class="label-uppercase-xs mb-1">Amount to Pay (₹)</label>
                <input type="number" step="0.01" name="amount_paid" max="{{ ledger.remaining_amount }}" value="{{ ledger.remaining_amount }}" 
                       class="form-control font-weight-bold text-dark" required>
            </div>

            <div class="form-group mb-3">
                <label class="label-uppercase-xs mb-1">Payment Mode</label>
                <select name="payment_mode" class="form-control text-secondary" required>
                    <option value="CASH">Cash</option>
                    <option value="ONLINE">Online / UPI</option>
                    <option value="CHEQUE">Cheque</option>
                </select>
            </div>

            <div class="form-group mb-4">
                <label class="label-uppercase-xs mb-1">Transaction ID / Reference (Optional)</label>
                <input type="text" name="transaction_id" placeholder="e.g., TXN1298493" class="form-control text-secondary">
            </div>

            <div class="form-row pt-2">
                <div class="col-6">
                    <a href="{% url 'student_fee_dashboard' ledger.student.id %}" class="btn btn-light btn-block font-weight-bold text-secondary border">
                        Cancel
                    </a>
                </div>
                <div class="col-6">
                    <button type="submit" class="btn btn-success btn-block font-weight-bold shadow-sm">
                        Submit Payment
                    </button>
                </div>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
