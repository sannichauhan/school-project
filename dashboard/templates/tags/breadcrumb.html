<div class="breadcrumbs-area">
    <h3>{{ page_title }}</h3>
    <ul>
        {% for crumb in breadcrumbs %}
            <li>
                {% if crumb.url %}
                    <a href="{{ crumb.url }}">{{ crumb.name }}</a>
                {% else %}
                    {{ crumb.name }}
                {% endif %}
            </li>
        {% endfor %}
    </ul>
</div>
