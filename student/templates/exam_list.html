<!DOCTYPE html>
<html>
<head>
    <title>Exam List</title>
</head>
<body>

<h2>Exam List</h2>

<a href="{% url 'exam_create' %}">+ Add Exam</a>

<table border="1" cellpadding="8">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Term</th>
        <th>Academic Year</th>
    </tr>

    {% for exam in exams %}
    <tr>
        <td>{{ exam.id }}</td>
        <td>{{ exam.name }}</td>
        <td>{{ exam.term }}</td>
        <td>{{ exam.academic_year }}</td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="4">No exams found</td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
