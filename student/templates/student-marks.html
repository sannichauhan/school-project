{% extends 'base2.html' %} 

{% block content %}
    <div id="wrapper" class="wrapper bg-ash">
       <!-- Header Menu Area Start Here -->
        {% include "tags/header.html" %}
        <!-- Header Menu Area End Here -->
         
        <!-- Page Area Start Here -->
        <div class="dashboard-page-one">
            <!-- Sidebar Area Start Here -->
            {% include "tags/sidebar.html" %}
            <!-- Sidebar Area End Here -->
            <div class="dashboard-content-one">
                <!-- Breadcubs Area Start Here -->
                {% include "tags/breadcrumb.html" %}
                <!-- Breadcubs Area End Here -->
<div class="bg-color-mark">
                <form method="post" id="marks-form">
    {% csrf_token %}
    {{ formset.management_form }}

    <div class="header-selection">
        <div class="row">
        <div class="col-xl-4">
        <label>Select Class:</label>
        

<select id="class-select" name="student_class" class="form-control">
    <option value="">Select Class</option>

    {% for class in classes %}
        <option value="{{ class.id }}">
            {{ class.name }}
        </option>
    {% endfor %}
</select>
</div>
<div class="col-xl-4">
<label>Select Student:</label>

<select id="student-select" name="student" class="form-control">

    <option value="">
        Select Student Name
    </option>

    {% for class in classes %}

        {% for student in class.students.all %}

            <option
                value="{{ student.id }}"
                data-class="{{ class.id }}"
            >
                {{ student.name }}
            </option>

        {% endfor %}

    {% endfor %}

</select>
</div>

       <div class="col-xl-4">
         <label>Select Exam:</label>
        <select name="exam" class="form-control">
            {% for e in exams %}
                <option value="{{ e.id }}">{{ e.name }}</option>
            {% endfor %}
        </select>
       </div>
    </div>
</div>

    <table id="marks-table" class="table table-bordered mt30">
        <thead>
            <tr>
                <th>Subject</th>
                <th>Test Marks</th>
                <th>Written Marks</th>
            </tr>
        </thead>
        <tbody id="subject-rows">
            </tbody>
    </table>

    <button type="submit" class="btn btn-info mt-3">Save Marks</button>
</form>
</div>
<script>
document.getElementById('class-select').addEventListener('change', function() {
    const className = this.value;
    const studentSelect = document.getElementById('student-select');
    const rowContainer = document.getElementById('subject-rows');
    const totalForms = document.getElementById('id_form-TOTAL_FORMS');

    // 1. Filter students in dropdown based on class
    Array.from(studentSelect.options).forEach(opt => {
        opt.style.display = opt.getAttribute('data-class') === className ? 'block' : 'none';
    });

    // 2. Fetch Subjects via AJAX
    fetch(`/students/api/subjects/?student_class=${className}`)
        .then(response => response.json())
        .then(data => {
            rowContainer.innerHTML = ''; // Clear old rows
            // totalForms.value = data.length; // Update Django's form management count

            data.forEach((subject, index) => {
                const row = `
                <tr>
                    <td>
                        ${subject.name}
                        <input type="hidden" name="form-${index}-subject" value="${subject.id}">
                    </td>
                    <td><input type="number" name="form-${index}-test_marks" value="0"> / ${subject.max_test_marks}</td>
                    <td><input type="number" name="form-${index}-written_marks" value="0"> / ${subject.max_written_marks}</td>
                    <input type="number" name="form-${index}-max_test_marks" value="${subject.max_test_marks}" hidden>
                    <input type="number" name="form-${index}-max_written_marks" value="${subject.max_written_marks}" hidden>
                    
                </tr>`;
                rowContainer.insertAdjacentHTML('beforeend', row);
            });
        });
});

</script>
<script>

document.addEventListener("DOMContentLoaded", function () {

    const classSelect = document.getElementById("class-select");

    const studentSelect = document.getElementById("student-select");

    classSelect.addEventListener("change", function () {

        const selectedClass = this.value;

        const options = studentSelect.querySelectorAll("option");

        options.forEach(function(option) {

            // default option always visible
            if (option.value === "") {
                option.hidden = false;
                return;
            }

            // show matching students
            if (option.dataset.class === selectedClass) {

                option.hidden = false;

            } else {

                option.hidden = true;
            }
        });

        // reset selected student
        studentSelect.value = "";
    });

});

</script>
                
                <!-- Footer Area Start Here -->
                {% include "tags/footer.html" %}
                <!-- Footer Area End Here -->
            </div>
        </div>
        <!-- Page Area End Here -->
    </div>
{% endblock content %}
