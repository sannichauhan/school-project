{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">
    <div class="card">
        <div class="card-header">
            <h4>Add Academic Session</h4>
        </div>

        <div class="card-body">
            <form method="post">
                {% csrf_token %}

                {{ form.non_field_errors }}

                <div class="mb-3">
                    <label>Start Year</label>
                    {{ form.start_year }}
                    {{ form.start_year.errors }}
                </div>

                <div class="mb-3">
                    <label>End Year</label>
                    {{ form.end_year }}
                    {{ form.end_year.errors }}
                </div>

                <button type="submit" class="btn btn-primary">
                    Save
                </button>

                <a href="{% url 'academic_session_list' %}"
                   class="btn btn-secondary">
                    Back
                </a>
            </form>
        </div>
    </div>
</div>

{% endblock %}
