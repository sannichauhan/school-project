{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <div class="d-flex justify-content-between mb-3">
        <h4>Academic Sessions</h4>

        <a href="{% url 'academic_session_create' %}"
           class="btn btn-success">
            Add Session
        </a>
    </div>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>ID</th>
                <th>Session</th>
            </tr>
        </thead>
        <tbody>
            {% for session in sessions %}
            <tr>
                <td>{{ session.id }}</td>
                <td>{{ session.start_date }} - {{ session.end_date }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="2">No academic sessions found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>

{% endblock %}
