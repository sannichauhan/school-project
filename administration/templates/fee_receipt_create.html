
{% extends 'base5.html' %} 

{% block content %}
    <div id="wrapper" class="wrapper bg-ash">
       <!-- Header Menu Area Start Here -->
        {% include "tags/header.html" %}
        <!-- Header Menu Area End Here -->
         
        <!-- Page Area Start Here -->
        <div class="dashboard-page-one">
            <!-- Sidebar Area Start Here -->
            {% include "tags/sidebar.html" %}
            <!-- Sidebar Area End Here -->
            <div class="dashboard-content-one">
                <!-- Breadcubs Area Start Here -->
                {% include "tags/breadcrumb.html" %}
                <!-- Breadcubs Area End Here -->
<h3>Create Fee Receipt</h3>

<form method="post">
    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">
        Save Receipt
    </button>

</form>
                

<script>

$(document).ready(function(){

    $('#id_academic_fee, #id_installment').change(function(){

        let fee_id = $('#id_academic_fee').val();
        let installment = $('#id_installment').val();

        if(fee_id && installment){

            $.ajax({

                url: "{% url 'get_installment_amount' %}",

                data: {
                    fee_id: fee_id,
                    installment: installment
                },

                success: function(response){

                    $('#id_amount').val(
                        response.amount
                    );

                }

            });

        }

    });

});

</script>
                <!-- Footer Area Start Here -->
                {% include "tags/footer.html" %}
                <!-- Footer Area End Here -->
            </div>
        </div>
        <!-- Page Area End Here -->
    </div>
{% endblock content %}
